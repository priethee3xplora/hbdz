<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HAPPY BIRTHDAY!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="bday-header">
        <h1>HAPPY BIRTHDAY TO MY FAVORITE GIRL:)! <img src="/media/flower.png" alt="giftbox" width="100" height="100"></h1>
    </header>

    <div class="card-container">
        <h2 style="color: var(--main-pink);">Click to Open Your Card</h2>
        <div id="opener" style="font-size: 100px; cursor: pointer;"><img src="/media/bdaybox.png" alt="giftbox" width="500" height="500"></div>
        
        <div id="nav-links" style="display: none; margin-top: 20px;">
            <nav>
                <a href="wishes.html">4 Birthday Wishes</a>
                <a href="gallery.html">The Birthday Girl</a>
                <a href="surprise.html">Final Surprise</a>
            </nav>
        </div>
    </div>

    <audio id="bgMusic" loop><source src="media/rum•gold - Call It What You Want.mp3" type="audio/mpeg"></audio>
    <button class="music-btn" onclick="toggleMusic()">🎵</button>

    <script src="script.js"></script>
    <script>
        document.getElementById('opener').addEventListener('click', function() {
            this.innerText = '';
            document.getElementById('nav-links').style.display = 'block';
            document.getElementById('bgMusic').play();
            localStorage.setItem('musicStatus', 'playing');
        });
    </script>
</body>
</html>
